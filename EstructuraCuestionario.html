<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cuestionario Didáctico - Bases de Datos</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- SweetAlert2 -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow">
<div class="card-body">

<h2 class="text-center mb-4">Cuestionario Didáctico: Fundamentos de Bases de Datos</h2>

<div class="alert alert-info">
<strong>Instrucciones:</strong>  
Selecciona la respuesta correcta en cada pregunta y luego presiona <b>Enviar respuestas</b>.
</div>

<form id="quizForm">

<!-- Pregunta 1 -->
<div class="mb-4">
<label class="form-label"><b>1. ¿Qué es un Sistema Gestor de Bases de Datos (SGBD)?</b></label>

<div class="form-check">
<input class="form-check-input" type="radio" name="p1" value="0">
<label class="form-check-label">Un programa para editar documentos</label>
</div>

<div class="form-check">
<input class="form-check-input" type="radio" name="p1" value="1">
<label class="form-check-label">Software que permite almacenar y gestionar bases de datos</label>
</div>

<div class="form-check">
<input class="form-check-input" type="radio" name="p1" value="0">
<label class="form-check-label">Un navegador web</label>
</div>
</div>

<!-- Pregunta 2 -->
<div class="mb-4">
<label class="form-label"><b>2. Verdadero o Falso: Las bases de datos se utilizan en bancos, universidades y empresas.</b></label>

<div class="form-check">
<input class="form-check-input" type="radio" name="p2" value="1">
<label class="form-check-label">Verdadero</label>
</div>

<div class="form-check">
<input class="form-check-input" type="radio" name="p2" value="0">
<label class="form-check-label">Falso</label>
</div>
</div>

<!-- Pregunta 3 -->
<div class="mb-4">
<label class="form-label"><b>3. ¿Cuál es la función principal de una base de datos?</b></label>

<div class="form-check">
<input class="form-check-input" type="radio" name="p3" value="1">
<label class="form-check-label">Almacenar y organizar información</label>
</div>

<div class="form-check">
<input class="form-check-input" type="radio" name="p3" value="0">
<label class="form-check-label">Diseñar páginas web</label>
</div>

<div class="form-check">
<input class="form-check-input" type="radio" name="p3" value="0">
<label class="form-check-label">Crear sistemas operativos</label>
</div>
</div>

<!-- Pregunta 4 -->
<div class="mb-4">
<label class="form-label"><b>4. Verdadero o Falso: El nivel físico describe cómo se almacenan los datos en el sistema.</b></label>

<div class="form-check">
<input class="form-check-input" type="radio" name="p4" value="1">
<label class="form-check-label">Verdadero</label>
</div>

<div class="form-check">
<input class="form-check-input" type="radio" name="p4" value="0">
<label class="form-check-label">Falso</label>
</div>
</div>

<!-- Pregunta 5 -->
<div class="mb-4">
<label class="form-label"><b>5. ¿Cuál lenguaje se usa comúnmente para consultar bases de datos?</b></label>

<div class="form-check">
<input class="form-check-input" type="radio" name="p5" value="0">
<label class="form-check-label">HTML</label>
</div>

<div class="form-check">
<input class="form-check-input" type="radio" name="p5" value="1">
<label class="form-check-label">SQL</label>
</div>

<div class="form-check">
<input class="form-check-input" type="radio" name="p5" value="0">
<label class="form-check-label">CSS</label>
</div>
</div>

<!-- Botón -->
<div class="text-center">
<button type="button" class="btn btn-primary" onclick="calcularResultado()">
Enviar respuestas
</button>
</div>

</form>

</div>
</div>
</div>

<script>

function calcularResultado(){

let form = document.forms["quizForm"];
let total = 5;
let puntos = 0;

for(let i=1; i<=total; i++){

let respuesta = form["p"+i];
let respondida = false;

for(let radio of respuesta){
if(radio.checked){
respondida = true;
puntos += parseInt(radio.value);
}
}

if(!respondida){
Swal.fire({
icon:'warning',
title:'Pregunta sin responder',
text:'Por favor responde todas las preguntas antes de enviar.'
});
return;
}

}

Swal.fire({
title:'Resultado',
text:'Obtuviste ' + puntos + ' de ' + total + ' respuestas correctas.',
icon: puntos >=3 ? 'success' : 'error'
});

}

</script>

</body>
</html>
